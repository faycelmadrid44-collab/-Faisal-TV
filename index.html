<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faisal TV - فيصل تي في</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tahoma'}
:root{--primary:#FFD700;--bg:#000;--card:#1a1a1a}
body{background:var(--bg);color:#fff;overflow:hidden}
.screen{display:none;height:100vh}
.screen.active{display:flex;flex-direction:column}
.header{background:#111;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--primary)}
.logo{display:flex;align-items:center;gap:10px;color:var(--primary);font-size:20px;font-weight:bold}
.logo i{color:var(--primary);font-size:24px}
.header-icons{display:flex;gap:15px}
.header-icons button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:8px}
.header-icons button:hover{color:var(--primary)}
.tabs{display:flex;background:#111}
.tab{flex:1;padding:12px;text-align:center;color:#999;cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:var(--primary);border-bottom:3px solid var(--primary)}
.sub-tabs{display:flex;gap:10px;padding:10px;overflow-x:auto;background:#0a0a0a}
.sub-btn{padding:8px 15px;background:#222;border:1px solid #333;border-radius:20px;color:#fff;white-space:nowrap;cursor:pointer}
.sub-btn.active{background:var(--primary);color:#000}
.grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:15px;padding-bottom:70px}
.card{background:var(--card);border:1px solid #333;border-radius:12px;padding:15px;text-align:center;cursor:pointer;position:relative}
.card:hover{border-color:var(--primary)}
.card i{font-size:40px;color:var(--primary);margin-bottom:8px}
.card-title{font-size:11px;font-weight:bold}
.fav{position:absolute;top:5px;left:5px;color:#555;cursor:pointer}
.fav.active{color:red}
.bottom-nav{position:fixed;bottom:0;width:100%;background:#111;display:flex;border-top:2px solid var(--primary)}
.nav-item{flex:1;text-align:center;padding:10px;color:#999;cursor:pointer;font-size:12px}
.nav-item.active{color:var(--primary)}
.nav-item i{display:block;font-size:20px;margin-bottom:3px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999}
.modal-content{background:#111;padding:30px;border-radius:15px;border:2px solid var(--primary);width:90%;max-width:400px}
.close-btn{float:left;background:none;border:none;color:var(--primary);font-size:24px;cursor:pointer}
.bright{filter:brightness(1.5)}
</style>
</head>
<body>

<!-- Main Screen -->
<div id="mainScreen" class="screen active">
  <div class="header">
    <div class="header-icons">
      <button id="searchBtn"><i class="fas fa-search"></i></button>
      <button id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
      <button id="brightBtn"><i class="fas fa-sun"></i></button>
    </div>
    <div class="logo">Faisal TV <i class="fas fa-crown"></i></div>
    <div class="header-icons">
      <button id="telegramBtn"><i class="fab fa-telegram"></i></button>
      <button id="menuBtn"><i class="fas fa-bars"></i></button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab">المباريات</div>
    <div class="tab">المسلسلات</div>
    <div class="tab">الأفلام</div>
    <div class="tab active">القنوات</div>
  </div>

  <div class="sub-tabs">
    <div class="sub-btn">كرتون 👶</div>
    <div class="sub-btn">الأخبار 📰</div>
    <div class="sub-btn active">الرياضة ⚽</div>
    <div class="sub-btn">الكل (2991) 📁</div>
  </div>

  <div id="itemsGrid" class="grid"></div>

  <div class="bottom-nav">
    <div class="nav-item"><i class="fas fa-home"></i>الرئيسية</div>
    <div class="nav-item"><i class="fas fa-tv"></i>مباشر</div>
    <div class="nav-item"><i class="fas fa-film"></i>الأفلام</div>
    <div class="nav-item"><i class="fas fa-tv"></i>المسلسلات</div>
    <div class="nav-item"><i class="fas fa-trophy"></i>المباريات</div>
    <div class="nav-item"><i class="fas fa-heart"></i>المفضلة</div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeSettings"><i class="fas fa-times"></i></button>
    <h2 style="color:var(--primary);text-align:center;margin-bottom:20px">إعدادات التطبيق</h2>
    <p>1. تغيير السيرفر</p>
    <p>2. مسح السجل</p>
    <p>3. حول التطبيق</p>
  </div>
</div>

<script>
// ازرار الهيدر
document.getElementById('searchBtn').onclick = () => alert('البحث قريباً');
document.getElementById('refreshBtn').onclick = () => location.reload();
document.getElementById('brightBtn').onclick = () => document.body.classList.toggle('bright');
document.getElementById('telegramBtn').onclick = () => window.open('https://t.me/FAISALDz44','_blank');
document.getElementById('menuBtn').onclick = () => document.getElementById('settingsModal').style.display='flex';
document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').style.display='none';

// مثال قنوات
const grid = document.getElementById('itemsGrid');
const channels = ['beIN MAX 1 FHD','beIN MAX 1 4K','BEIN MAX WC 2026','BEIN 4K WC 2026','BEIN MAX 1','beIN MAX 1HD','beIN MAX 1 HD','BEIN MAX 1HD'];
channels.forEach(name=>{
  grid.innerHTML += `
  <div class="card">
    <i class="fas fa-star fav" onclick="this.classList.toggle('active')"></i>
    <i class="fas fa-tv"></i>
    <div class="card-title">${name}</div>
  </div>`;
});
</script>
</body>
</html>
