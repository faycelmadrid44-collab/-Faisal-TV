<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Faisal TV 👑</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
:root{--gold:#FFC107;--bg:#000;--card:#121212;--text:#fff;--gray:#777}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--text)}
.header-pro{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:#000;border-bottom:1px solid #222}
.app-title{color:var(--gold);font-size:20px;font-weight:900}
.btn-icon{background:transparent;border:none;color:var(--text);font-size:20px;padding:8px;cursor:pointer}
.main-tabs{display:flex;background:#0a0a0a;border-bottom:2px solid #222}
.main-tab{flex:1;padding:14px;background:none;border:none;color:var(--gray);font-size:16px;font-weight:700;cursor:pointer}
.main-tab.active{color:var(--gold);border-bottom:3px solid var(--gold)}
.sub-categories{display:flex;gap:10px;padding:12px;overflow-x:auto;background:#0a0a0a}
.sub-categories button{padding:8px 18px;background:#1a1a1a;border:none;border-radius:20px;color:var(--text);cursor:pointer;font-weight:600}
.sub-categories button.active{background:var(--gold);color:#000}
.items-grid-pro{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:15px;padding-bottom:90px}
.item-card-pro{background:var(--card);border-radius:12px;padding:10px;text-align:center;cursor:pointer}
.item-icon{font-size:45px;color:var(--gold);margin:15px 0}
.item-title{font-size:13px;font-weight:700;height:40px;overflow:hidden}
.bottom-nav-pro{position:fixed;bottom:0;width:100%;background:#0a0a0a;display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #222}
.nav-item{background:none;border:none;color:var(--gray);text-align:center;font-size:11px}
.nav-item.active{color:var(--gold)}
.video-player{width:100%;height:100vh;background:#000}
.exit-player{position:absolute;top:20px;right:20px;background:var(--gold);color:#000;border:none;padding:12px;border-radius:50%;font-size:20px;cursor:pointer;z-index:999}
.screen{display:none}.screen.active{display:block}
.loading{text-align:center;padding:50px;color:var(--gold)}
</style>
</head>
<body>

<div id="mainScreen" class="screen active">
  <header class="header-pro">
    <div class="header-center">
      <span class="crown">👑</span>
      <h1 class="app-title">Faisal TV</h1>
    </div>
    <div class="header-right">
      <button class="btn-icon" onclick="location.reload()"><i class="fas fa-sync"></i></button>
    </div>
  </header>

  <nav class="main-tabs">
    <button class="main-tab active" onclick="loadCategory('channels')">المباريات</button>
    <button class="main-tab" onclick="loadCategory('series')">المسلسلات</button>
    <button class="main-tab" onclick="loadCategory('movies')">الافلام</button>
    <button class="main-tab" onclick="loadCategory('channels')">القنوات</button>
  </nav>

  <div class="sub-categories" id="subCategoriesContainer"></div>
  <div class="content-area"><div class="items-grid-pro" id="itemsGrid"></div></div>

  <nav class="bottom-nav-pro">
    <button class="nav-item active" onclick="loadCategory('channels')"><i class="fas fa-home"></i><span>الرئيسية</span></button>
    <button class="nav-item"><i class="fas fa-star"></i><span>المفضلة</span></button>
    <button class="nav-item"><i class="fas fa-clock"></i><span>السجل</span></button>
  </nav>
</div>

<div id="playerScreen" class="screen">
  <button class="exit-player" onclick="exitPlayer()"><i class="fas fa-times"></i></button>
  <video id="videoPlayer" class="video-player" controls autoplay></video>
</div>

<script>
// ===== CONFIG =====
const CONFIG = {HOST: "http://longsat.xyz:80", USER: "delfraissy", PASS: "aout0023"};

// ===== API =====
class XtreamAPI {
    constructor(host, username, password) {this.host = host;this.username = username;this.password = password;}
    async request(action, params = {}) {
        let url = `${this.host}/player_api.php?username=${this.username}&password=${this.password}&action=${action}`;
        for(let key in params) url += `&${key}=${params[key]}`;
        let res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
        return await res.json();
    }
    getLiveCategories(){return this.request('get_live_categories')}
    getLiveStreams(){return this.request('get_live_streams')}
    getVodCategories(){return this.request('get_vod_categories')}
    getVodStreams(cat){return this.request('get_vod_streams',{category_id:cat})}
    getSeriesCategories(){return this.request('get_series_categories')}
    getSeries(cat){return this.request('get_series',{category_id:cat})}
}

const api = new XtreamAPI(CONFIG.HOST, CONFIG.USER, CONFIG.PASS);

// ===== LOAD =====
window.onload = () => loadCategory('channels');

async function loadCategory(cat){
    document.getElementById('itemsGrid').innerHTML = '<div class="loading">جاري التحميل...</div>';
    if(cat == 'channels'){
        let cats = await api.getLiveCategories();
        renderSubs(cats, loadLive);
        if(cats[0]) loadLive(cats[0].category_id);
    }
    if(cat == 'movies'){
        let cats = await api.getVodCategories();
        renderSubs(cats, loadVod);
        if(cats[0]) loadVod(cats[0].category_id);
    }
    if(cat == 'series'){
        let cats = await api.getSeriesCategories();
        renderSubs(cats, loadSeries);
        if(cats[0]) loadSeries(cats[0].category_id);
    }
}

function renderSubs(cats, func){
    document.getElementById('subCategoriesContainer').innerHTML = cats.slice(0,10).map((c,i)=>`
        <button class="${i==0?'active':''}" onclick="load${func.name.replace('load','')}(${c.category_id})">${c.category_name}</button>
    `).join('');
}

async function loadLive(id){let data=await api.getLiveStreams(); renderItems(data.filter(x=>x.category_id==id));}
async function loadVod(id){let data=await api.getVodStreams(id); renderItems(data);}
async function loadSeries(id){let data=await api.getSeries(id); renderItems(data);}

function renderItems(items){
    document.getElementById('itemsGrid').innerHTML = items.slice(0,60).map(x=>`
        <div class="item-card-pro" onclick="play('${x.stream_id || x.id}', '${x.name}')">
            <div class="item-icon"><i class="fas fa-tv"></i></div>
            <div class="item-title">${x.name}</div>
        </div>
    `).join('');
}

function play(id, name){
    let url = `${CONFIG.HOST}/live/${CONFIG.USER}/${CONFIG.PASS}/${id}.m3u8`;
    document.getElementById('mainScreen').classList.remove('active');
    document.getElementById('playerScreen').classList.add('active');
    document.getElementById('videoPlayer').src = url;
}

function exitPlayer(){
    document.getElementById('videoPlayer').pause();
    document.getElementById('videoPlayer').src = '';
    document.getElementById('playerScreen').classList.remove('active');
    document.getElementById('mainScreen').classList.add('active');
}
</script>
</body>
</html>
