<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faisal TV - فيصل تي في</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--gold:#FFC107;--bg:#000;--card:#121212;--text:#fff;--gray:#777}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--text)}
.screen{display:none}.screen.active{display:block}

/* Header */
.header-pro{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:#000;border-bottom:1px solid #222}
.header-left,.header-right{display:flex;gap:8px}
.header-center{display:flex;align-items:center;gap:8px}
.crown{font-size:24px}
.app-title{color:var(--gold);font-size:20px;font-weight:900}
.btn-icon{background:transparent;border:none;color:var(--text);font-size:20px;padding:8px;cursor:pointer;transition:0.3s}
.btn-icon:hover{color:var(--gold);transform:scale(1.1)}

/* Main Tabs */
.main-tabs{display:flex;background:#0a0a0a;border-bottom:2px solid #222}
.main-tab{flex:1;padding:14px;background:none;border:none;color:var(--gray);font-size:16px;font-weight:700;cursor:pointer;position:relative}
.main-tab.active{color:var(--gold)}
.main-tab.active::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:3px;background:var(--gold)}

/* Sub Categories */
.sub-categories{display:flex;gap:10px;padding:12px;overflow-x:auto;background:#0a0a0a}
.sub-categories button{padding:8px 18px;background:#1a1a1a;border:none;border-radius:20px;color:var(--text);cursor:pointer;font-weight:600;white-space:nowrap}
.sub-categories button.active{background:var(--gold);color:#000}

/* Items Grid */
.content-area{padding-bottom:80px}
.items-grid-pro{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:15px}
@media(max-width:768px){.items-grid-pro{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.items-grid-pro{grid-template-columns:repeat(2,1fr)}}
.item-card-pro{background:var(--card);border-radius:12px;padding:10px;text-align:center;cursor:pointer;position:relative;transition:0.3s}
.item-card-pro:hover{transform:scale(1.05);background:#1a1a1a}
.item-fav{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border:none;color:var(--gray);padding:6px;border-radius:50%;cursor:pointer}
.item-icon{font-size:45px;color:var(--gold);margin:15px 0}
.item-title{font-size:13px;font-weight:700;height:40px;overflow:hidden;line-height:1.4}

/* Bottom Nav */
.bottom-nav-pro{position:fixed;bottom:0;width:100%;background:#0a0a0a;display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #222;z-index:100}
.nav-item{background:none;border:none;color:var(--gray);text-align:center;font-size:11px;cursor:pointer}
.nav-item.active{color:var(--gold)}
.nav-item i{display:block;font-size:22px;margin-bottom:4px}

/* Player */
.video-player{width:100%;height:100vh;background:#000}
.exit-player{position:absolute;top:20px;right:20px;background:var(--gold);color:#000;border:none;padding:12px;border-radius:50%;font-size:20px;cursor:pointer;z-index:999}

/* Side Menu */
.side-menu{position:fixed;top:0;right:-300px;width:280px;height:100%;background:#111;z-index:1000;transition:0.3s}
.side-menu.active{right:0}
.menu-header{display:flex;justify-content:space-between;padding:20px;border-bottom:1px solid #333}
.menu-items button{width:100%;padding:15px;background:none;border:none;color:#fff;text-align:right;cursor:pointer;font-size:16px}
.menu-items button i{margin-left:10px;color:var(--gold)}
.menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;z-index:999}
.menu-overlay.active{display:block}
.loading{text-align:center;padding:50px;font-size:18px}
</style>
</head>
<body>

<div id="mainScreen" class="screen active">
  <div class="header-pro">
    <div class="header-left">
      <button class="btn-icon" id="searchBtn"><i class="fas fa-search"></i></button>
      <button class="btn-icon" id="refreshBtn"><i class="fas fa-rotate"></i></button>
      <button class="btn-icon" id="themeBtn"><i class="fas fa-sun"></i></button>
    </div>
    <div class="header-center">
      <span class="crown">👑</span>
      <h1 class="app-title">Faisal TV</h1>
      <span class="crown">👑</span>
    </div>
    <div class="header-right">
      <a href="https://t.me/FAISALDz44" class="btn-icon" target="_blank"><i class="fab fa-telegram"></i></a>
      <button class="btn-icon" id="menuBtn"><i class="fas fa-bars"></i></button>
    </div>
  </div>

  <div class="main-tabs">
    <button class="main-tab" data-category="matches"><span>المباريات</span></button>
    <button class="main-tab" data-category="series"><span>المسلسلات</span></button>
    <button class="main-tab" data-category="movies"><span>الأفلام</span></button>
    <button class="main-tab active" data-category="channels"><span>القنوات</span></button>
  </div>

  <div id="subCategoriesContainer" class="sub-categories"></div>
  <div class="content-area"><div id="itemsGrid" class="items-grid-pro"><div class="loading">جاري التحميل...</div></div></div>

  <div class="bottom-nav-pro">
    <button class="nav-item" data-section="favorites"><i class="far fa-heart"></i><span>المفضلة</span></button>
    <button class="nav-item" data-section="matches"><i class="fas fa-trophy"></i><span>المباريات</span></button>
    <button class="nav-item" data-section="series"><i class="fas fa-film"></i><span>المسلسلات</span></button>
    <button class="nav-item" data-section="movies"><i class="fas fa-clapperboard"></i><span>الأفلام</span></button>
    <button class="nav-item active" data-section="live"><i class="fas fa-tv"></i><span>مباشر</span></button>
    <button class="nav-item" data-section="home"><i class="fas fa-home"></i><span>الرئيسية</span></button>
  </div>
</div>

<div id="playerScreen" class="screen">
  <video id="videoPlayer" class="video-player" controls autoplay></video>
  <button id="exitBtn" class="exit-player"><i class="fas fa-times"></i></button>
</div>

<div id="sideMenu" class="side-menu">
  <div class="menu-header"><h2>الإعدادات</h2><button id="closeMenu" class="btn-icon"><i class="fas fa-times"></i></button></div>
  <div class="menu-items">
    <button><i class="fas fa-save"></i> حفظ البيانات</button>
    <button><i class="fas fa-trash"></i> مسح الكاش</button>
    <button><i class="fas fa-info"></i> حول التطبيق</button>
  </div>
</div>
<div id="menuOverlay" class="menu-overlay"></div>

<script>
// ====== كود XTREAM API مدموج ======
class XtreamAPI {
    constructor(host, username, password) {
        this.host = host;this.username = username;this.password = password;
    }
    async request(action, params = {}) {
        let url = `${this.host}/player_api.php?username=${this.username}&password=${this.password}&action=${action}`;
        for(let key in params) url += `&${key}=${params[key]}`;
        try{
            let res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
            return await res.json();
        }catch(e){return []}
    }
    getLiveCategories(){return this.request('get_live_categories')}
    getLiveStreams(){return this.request('get_live_streams')}
    getVodCategories(){return this.request('get_vod_categories')}
    getVodStreams(cat){return cat?this.request('get_vod_streams',{category_id:cat}):this.request('get_vod_streams')}
    getSeriesCategories(){return this.request('get_series_categories')}
}

// ====== الكود الاساسي + بياناتك ======
let api; let currentCategory='channels';
const CONFIG={HOST:"http://longsat.xyz:80",USER:"delfraissy",PASS:"aout0023"};

window.onload = () => {
    api=new XtreamAPI(CONFIG.HOST,CONFIG.USER,CONFIG.PASS);
    loadCategory('channels');
    setupButtons();
};

function setupButtons(){
    document.getElementById('searchBtn').onclick=()=>alert('البحث قريبا');
    document.getElementById('refreshBtn').onclick=()=>location.reload();
    document.getElementById('themeBtn').onclick=()=>alert('تغيير الثيم');
    document.getElementById('menuBtn').onclick=()=>{document.getElementById('sideMenu').classList.add('active');document.getElementById('menuOverlay').classList.add('active')};
    document.getElementById('closeMenu').onclick=()=>{document.getElementById('sideMenu').classList.remove('active');document.getElementById('menuOverlay').classList.remove('active')};
    document.getElementById('menuOverlay').onclick=()=>{document.getElementById('sideMenu').classList.remove('active');document.getElementById('menuOverlay').classList.remove('active')};
    document.getElementById('exitBtn').onclick=exitPlayer;

    document.querySelectorAll('.main-tab').forEach(btn=>{
        btn.onclick=()=>{document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadCategory(btn.dataset.category)}
    });
}

async function loadCategory(cat){
    currentCategory=cat;
    document.getElementById('itemsGrid').innerHTML='<div class="loading">جاري التحميل...</div>';

    if(cat=='channels'){
        let cats=await api.getLiveCategories();
        document.getElementById('subCategoriesContainer').innerHTML=cats.slice(0,10).map((c,i)=>`
            <button class="${i==0?'active':''}" onclick="loadLive(${c.category_id})">${c.category_name}</button>
        `).join('');
        if(cats.length>0) loadLive(cats[0].category_id);
    }
    if(cat=='movies'){
        let cats=await api.getVodCategories();
        document.getElementById('subCategoriesContainer').innerHTML=cats.slice(0,10).map((c,i)=>`
            <button onclick="loadVod(${c.category_id})">${c.category_name}</button>
        `).join('');
        if(cats.length>0) loadVod(cats[0].category_id);
    }
}

async function loadLive(catId){
    let data=await api.getLiveStreams();
    let filtered=data.filter(x=>x.category_id==catId).slice(0,60);
    renderItems(filtered);
}

async function loadVod(catId){
    let data=await api.getVodStreams(catId);
    renderItems(data.slice(0,60));
}

function renderItems(items){
    if(items.length==0){document.getElementById('itemsGrid').innerHTML='<div class="loading">لا توجد عناصر</div>';return}
    document.getElementById('itemsGrid').innerHTML=items.map(x=>`
        <div class="item-card-pro" onclick="play('${CONFIG.HOST}/live/${CONFIG.USER}/${CONFIG.PASS}/${x.stream_id}.m3u8')">
            <button class="item-fav"><i class="far fa-star"></i></button>
            <div class="item-icon"><i class="fas fa-tv"></i></div>
            <div class="item-title">${x.name}</div>
        </div>
    `).join('');
}

function play(url){
    document.getElementById('mainScreen').classList.remove('active');
    document.getElementById('playerScreen').classList.add('active');
    document.getElementById('videoPlayer').src=url;
}

function exitPlayer(){
    document.getElementById('videoPlayer').pause();
    document.getElementById('videoPlayer').src='';
    document.getElementById('playerScreen').classList.remove('active');
    document.getElementById('mainScreen').classList.add('active');
}
</script>
</body>
</html>
