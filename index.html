<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faisal TV</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma}
body{background:#000;color:#fff;transition:filter 0.3s}
:root{--gold:#FFD700}
.header{background:#111;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold)}
.logo{color:var(--gold);font-size:20px;font-weight:bold;display:flex;align-items:center;gap:8px}
.icons{display:flex;gap:16px}
.icons button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.tabs{display:flex;background:#111}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;color:#999;font-size:14px}
.tab.active{color:var(--gold);border-bottom:3px solid var(--gold)}
.sub{display:flex;gap:8px;padding:10px;overflow-x:auto;background:#0a0a0a}
.sub button{padding:8px 14px;background:#222;border:1px solid #444;border-radius:25px;color:#fff;cursor:pointer;white-space:nowrap;font-size:13px}
.sub button.active{background:var(--gold);color:#000;border-color:var(--gold)}
/* التعديل هنا: 3 في السطر بدل 2 */
.grid{padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-bottom:70px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px;text-align:center;cursor:pointer;position:relative}
.card:hover{border-color:var(--gold)}
/* تصغير الايقونات */
.card i.fa-tv{font-size:28px;color:var(--gold);margin-bottom:6px}
.card i.fa-star{position:absolute;top:5px;left:5px;color:#555;font-size:16px;cursor:pointer}
.card i.fa-star.active{color:red}
.card-title{font-size:10px;font-weight:bold;line-height:1.3}
.bottom{position:fixed;bottom:0;width:100%;background:#111;display:flex;border-top:2px solid var(--gold);z-index:10}
.nav{flex:1;padding:8px;text-align:center;color:#999;font-size:10px;cursor:pointer}
.nav.active{color:var(--gold)}
.nav i{display:block;font-size:18px;margin-bottom:3px}
.bright{filter:brightness(1.7)}
</style>
</head>
<body>

<div class="header">
  <div class="icons">
    <button id="menu"><i class="fas fa-bars"></i></button>
    <button onclick="window.open('https://t.me/FAISALDz44','_blank')"><i class="fab fa-telegram"></i></button>
  </div>
  <div class="logo"><i class="fas fa-crown"></i> Faisal TV</div>
  <div class="icons">
    <button id="light"><i class="fas fa-sun"></i></button>
    <button id="refresh"><i class="fas fa-sync-alt"></i></button>
    <button id="search"><i class="fas fa-search"></i></button>
  </div>
</div>

<div class="tabs">
  <div class="tab" onclick="alert('المباريات')">المباريات</div>
  <div class="tab" onclick="alert('المسلسلات')">المسلسلات</div>
  <div class="tab" onclick="alert('الأفلام')">الأفلام</div>
  <div class="tab active">القنوات</div>
</div>

<div class="sub">
  <button onclick="alert('كرتون')">👶 كرتون</button>
  <button onclick="alert('الأخبار')">📰 الأخبار</button>
  <button class="active" onclick="alert('الرياضة')">⚽ الرياضة</button>
  <button onclick="alert('الكل 2991 قناة')">📁 الكل (2991)</button>
</div>

<div id="grid" class="grid"></div>

<div class="bottom">
  <div class="nav" onclick="alert('المفضلة')"><i class="fas fa-heart"></i>المفضلة</div>
  <div class="nav active"><i class="fas fa-broadcast-tower"></i>مباشر</div>
  <div class="nav" onclick="alert('المباريات')"><i class="fas fa-trophy"></i>المباريات</div>
  <div class="nav" onclick="alert('المسلسلات')"><i class="fas fa-tv"></i>المسلسلات</div>
  <div class="nav" onclick="alert('الأفلام')"><i class="fas fa-film"></i>الأفلام</div>
  <div class="nav" onclick="alert('الرئيسية')"><i class="fas fa-home"></i>الرئيسية</div>
</div>

<script>
// قنوات
setTimeout(()=>{
  const channels = [
  'AR| beIN MAX 1| 4K','AR| beIN MAX 1| FHD','BEIN 4K WC 2026','BEIN MAX WC 2026',
  'AR| beIN MAX| 1HD','|AR| BEIN MAX 1','BEIN MAX 1HD','AR| beIN MAX 1| HD'
  ];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  channels.forEach(ch=>{
    grid.innerHTML += `<div class="card" onclick="alert('تشغيل: ${ch}')"><i class="fas fa-star" onclick="this.classList.toggle('active');event.stopPropagation()"></i><i class="fas fa-tv"></i><div class="card-title">${ch}</div></div>`;
  });
},500);

// الازرار
document.getElementById('search').onclick = () => alert('🔍 البحث');
document.getElementById('refresh').onclick = () => location.reload();
document.getElementById('light').onclick = () => document.body.classList.toggle('bright');
document.getElementById('menu').onclick = () => alert('⚙️ الإعدادات');
</script>
</body>
</html>
