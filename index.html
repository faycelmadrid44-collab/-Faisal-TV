<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Faisal TV - فيصل تي في</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="logo-section">
                <div class="crown">👑</div>
                <h1 class="logo-title">Faisal TV</h1>
                <p class="logo-subtitle">فيصل تي في</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <i class="fas fa-server"></i>
                    <input type="text" id="hostInput" placeholder="Server Host" value="http://longsat.xyz:80" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="userInput" placeholder="Username" value="delfraissy" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passInput" placeholder="Password" value="aout0023" required>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                
                <div class="loading-spinner" id="loadingSpinner" style="display:none;">
                    <div class="spinner"></div>
                    <p>جاري الاتصال...</p>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Main Screen -->
    <div id="mainScreen" class="screen">
        <!-- Sidebar Menu -->
        <div id="sidebarMenu" class="sidebar-menu">
            <div class="sidebar-header">
                <h2>الإعدادات</h2>
                <button id="closeSidebar" class="close-sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="sidebar-content">
                <!-- Quality Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-cog"></i> الجودة</h3>
                    <div class="settings-group">
                        <label>
                            <input type="radio" name="quality" value="auto" checked>
                            <span>تلقائي</span>
                        </label>
                        <label>
                            <input type="radio" name="quality" value="1080p">
                            <span>Full HD 1080p</span>
                        </label>
                        <label>
                            <input type="radio" name="quality" value="720p">
                            <span>HD 720p</span>
                        </label>
                        <label>
                            <input type="radio" name="quality" value="480p">
                            <span>SD 480p</span>
                        </label>
                    </div>
                </div>
                
                <!-- Display Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-eye"></i> العرض</h3>
                    <div class="settings-group">
                        <label>
                            <input type="checkbox" id="darkMode" checked>
                            <span>الوضع الليلي</span>
                        </label>
                        <label>
                            <input type="checkbox" id="animationToggle" checked>
                            <span>التأثيرات المرئية</span>
                        </label>
                    </div>
                </div>
                
                <!-- Language Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-globe"></i> اللغة</h3>
                    <div class="settings-group">
                        <label>
                            <input type="radio" name="language" value="ar" checked>
                            <span>العربية</span>
                        </label>
                        <label>
                            <input type="radio" name="language" value="en">
                            <span>English</span>
                        </label>
                    </div>
                </div>
                
                <!-- Playback Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-play"></i> التشغيل</h3>
                    <div class="settings-group">
                        <label>
                            <input type="checkbox" id="autoplay" checked>
                            <span>التشغيل التلقائي</span>
                        </label>
                        <label>
                            <input type="checkbox" id="subtitles">
                            <span>الترجمات</span>
                        </label>
                    </div>
                </div>
                
                <!-- Cache & Storage -->
                <div class="settings-section">
                    <h3><i class="fas fa-database"></i> التخزين</h3>
                    <button class="btn-clear" id="clearCache">
                        <i class="fas fa-trash"></i> مسح الذاكرة المؤقتة
                    </button>
                    <button class="btn-clear" id="clearHistory">
                        <i class="fas fa-history"></i> مسح السجل
                    </button>
                </div>
                
                <!-- Account Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-user-circle"></i> الحساب</h3>
                    <div id="accountInfo" class="account-info"></div>
                    <button class="btn-logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                    </button>
                </div>
                
                <!-- About -->
                <div class="settings-section">
                    <h3><i class="fas fa-info-circle"></i> حول التطبيق</h3>
                    <p class="about-text">Faisal TV v1.0.0</p>
                    <p class="about-text">تطبيق بث احترافي</p>
                    <a href="https://t.me/FAISALDz44" class="telegram-link">
                        <i class="fab fa-telegram"></i> تواصل معنا
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Sidebar Overlay -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        
        <!-- Search Modal -->
        <div id="searchModal" class="search-modal" style="display:none;">
            <div class="search-container">
                <button id="closeSearch" class="close-search">
                    <i class="fas fa-times"></i>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن قناة أو فيلم أو مسلسل...">
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>
        
        <div class="header">
            <div class="header-left">
                <button class="btn-menu" id="menuBtn" title="القائمة">
                    <i class="fas fa-bars"></i>
                    <i class="fas fa-bars"></i>
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="header-center">
                <div class="crown-logo">👑</div>
                <h1 class="app-title">Faisal TV</h1>
                <div class="crown-logo">👑</div>
            </div>
            
            <div class="header-right">
                <button class="btn-icon" id="searchBtn" title="البحث">
                    <i class="fas fa-search"></i>
                </button>
                <button class="btn-icon" id="refreshBtn" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="btn-icon" id="themeBtn" title="الوضع">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="https://t.me/FAISALDz44" class="btn-telegram" title="Telegram" target="_blank">
                    <i class="fab fa-telegram"></i>
                </a>
            </div>
        </div>
        
        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="tab-btn active" data-category="channels">
                <i class="fas fa-tv"></i>
                <span>القنوات</span>
            </button>
            <button class="tab-btn" data-category="movies">
                <i class="fas fa-film"></i>
                <span>الأفلام</span>
            </button>
            <button class="tab-btn" data-category="series">
                <i class="fas fa-play-circle"></i>
                <span>المسلسلات</span>
            </button>
            <button class="tab-btn" data-category="other">
                <i class="fas fa-folder"></i>
                <span>أخرى</span>
            </button>
        </div>
        
        <!-- Sub Categories -->
        <div id="subCategoriesContainer" class="sub-categories">
            <!-- Sub categories will be loaded here -->
        </div>
        
        <!-- Content Area -->
        <div class="content-area">
            <div id="itemsGrid" class="items-grid">
                <!-- Items will be loaded here -->
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item active" data-section="home">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </button>
            <button class="nav-item" data-section="favorites">
                <i class="fas fa-heart"></i>
                <span>المفضلة</span>
            </button>
            <button class="nav-item" data-section="history">
                <i class="fas fa-history"></i>
                <span>السجل</span>
            </button>
            <button class="nav-item" data-section="settings">
                <i class="fas fa-cog"></i>
                <span>الإعدادات</span>
            </button>
        </div>
    </div>
    
    <!-- Player Screen -->
    <div id="playerScreen" class="screen">
        <div class="player-container">
            <video id="videoPlayer" class="video-player" controls>
                متصفحك لا يدعم تشغيل الفيديو
            </video>
            
            <div class="player-controls" id="playerControls">
                <button id="qualityBtn" class="player-btn quality-btn" title="اختر الجودة">
                    <i class="fas fa-cog"></i> الجودة
                </button>
                <button id="fullscreenBtn" class="player-btn" title="ملء الشاشة">
                    <i class="fas fa-expand"></i>
                </button>
                <button id="exitBtn" class="player-btn exit-btn" title="خروج">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Quality Menu -->
            <div id="qualityMenu" class="quality-menu" style="display:none;">
                <div class="quality-options">
                    <!-- Quality options will be added here -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Exit Confirmation Modal -->
    <div id="exitModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="exit-emoji">😢</div>
            <h2>هل تريد المغادرة؟</h2>
            <div class="modal-buttons">
                <button class="btn-yes" id="confirmExit">نعم</button>
                <button class="btn-no" id="cancelExit">لا</button>
            </div>
        </div>
    </div>
    
    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator" style="display:none;">
        <div class="loading-spinner-small"></div>
    </div>
    
    <script src="xtream-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
