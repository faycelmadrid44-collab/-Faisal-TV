<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Faisal TV</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--gold:#FFC107;--dark:#0a0a0a;--card:#1a1a1a}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--dark);color:#fff;overflow-x:hidden}

/* الهيدر الفوق */
.topbar{background:#000;padding:10px 15px;display:flex;align-items:center;justify-content:space-between}
.topbar i{font-size:20px;color:#ccc;cursor:pointer}
.topbar a{color:var(--gold)}
.logo{color:var(--gold);font-size:22px;font-weight:900;display:flex;align-items:center;gap:5px}
.logo i{color:var(--gold)}

/* التابات الفوق */
.main-tabs{display:flex;justify-content:space-around;background:#111;padding:12px 0;border-bottom:1px solid #222}
.main-tabs div{color:#aaa;font-size:14px;cursor:pointer;font-weight:600}
.main-tabs .active{color:var(--gold);border-bottom:2px solid var(--gold);padding-bottom:8px}

/* اقسام الرياضة */
.sub-cats{display:flex;gap:10px;padding:12px;overflow-x:auto;background:#0d0d0d}
.sub-cat{padding:8px 16px;background:#222;border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer}
.sub-cat.active{background:var(--gold);color:#000;font-weight:700}

/* شبكة القنوات */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px;padding-bottom:80px}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--card);border-radius:12px;padding:10px;text-align:center;position:relative;cursor:pointer;border:1px solid #222}
.card:hover{border-color:var(--gold)}
.card .star{position:absolute;top:6px;left:6px;color:#555;font-size:14px}
.card .icon{font-size:40px;color:var(--gold);margin:15px 0}
.card p{font-size:11px;color:#ddd;height:35px;overflow:hidden}

/* الفوتر التحت */
.footer{position:fixed;bottom:0;left:0;width:100%;background:#000;display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #222;z-index:99}
.footer div{text-align:center;font-size:10px;color:#aaa;cursor:pointer}
.footer .active{color:var(--gold)}
.footer i{font-size:20px;display:block;margin-bottom:3px}

/* المشغل */
.player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:999}
video{width:100%;height:100%}
.controls{position:absolute;bottom:20px;width:100%;text-align:center;opacity:0;transition:0.3s}
.player:hover .controls{opacity:1}
.btn{background:var(--gold);color:#000;border:none;padding:10px 20px;margin:5px;border-radius:8px;font-weight:700}
.exit{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a1a;padding:25px;border-radius:12px;text-align:center;display:none;z-index:1000;border:1px solid var(--gold)}
</style>
</head>
<body>

<div class="topbar">
  <i class="fa fa-search"></i>
  <i class="fa fa-rotate"></i>
  <i class="fa fa-sun"></i>
  <div class="logo">Faisal TV <i class="fa fa-crown"></i></div>
  <a href="https://t.me/FAISALDz44" target="_blank"><i class="fa-brands fa-telegram" style="color:var(--gold);font-size:22px"></i></a>
  <i class="fa fa-bars"></i>
</div>

<div class="main-tabs">
  <div>المباريات</div>
  <div>المسلسلات</div>
  <div>الأفلام</div>
  <div class="active">القنوات</div>
</div>

<div class="sub-cats" id="subCats">
  <div class="sub-cat">كرتون وأطفال</div>
  <div class="sub-cat">الأخبار</div>
  <div class="sub-cat active">الرياضة ⚽</div>
  <div class="sub-cat">الكل (2991)</div>
</div>

<div class="grid" id="grid">جاري التحميل...</div>

<div class="footer">
  <div><i class="fa fa-heart"></i>المفضلة</div>
  <div><i class="fa fa-trophy"></i>المباريات</div>
  <div><i class="fa fa-clapperboard"></i>المسلسلات</div>
  <div><i class="fa fa-film"></i>الأفلام</div>
  <div class="active"><i class="fa fa-tv"></i>مباشر</div>
  <div><i class="fa fa-house"></i>الرئيسية</div>
</div>

<div class="player" id="player">
  <video id="video" controls></video>
  <div class="controls">
    <button class="btn" onclick="back()"><i class="fa fa-arrow-right"></i> رجوع</button>
    <button class="btn" onclick="fullscreen()"><i class="fa fa-expand"></i> تكبير</button>
  </div>
</div>

<div class="exit" id="exitBox">
  <p>😢 هل تريد الخروج من Faisal TV؟</p>
  <button class="btn" onclick="window.close()">Yes</button>
  <button class="btn" onclick="exitBox.style.display='none'">No</button>
</div>

<script>
const HOST="http://longsat.xyz:80"; 
const USER="delfraissy"; 
const PASS="aout0023";

async function loadChannels(){
  let url = `${HOST}/player_api.php?username=${USER}&password=${PASS}&action=get_live_streams`;
  let res = await fetch(url);
  let data = await res.json();
  
  document.getElementById('grid').innerHTML = data.slice(0,2000).map(ch=>`
    <div class="card" onclick="play('${ch.stream_id}')">
      <i class="fa fa-star star"></i>
      <i class="fa fa-tv icon"></i>
      <p>${ch.name}</p>
    </div>
  `).join('');
}

function play(id){
  let url = `${HOST}/live/${USER}/${PASS}/${id}.m3u8`;
  document.getElementById('video').src = url;
  document.getElementById('player').style.display='block';
  document.getElementById('video').play();
}

function back(){document.getElementById('player').style.display='none';document.getElementById('video').pause()}
function fullscreen(){document.getElementById('video').requestFullscreen()}
document.addEventListener('keydown',e=>{if(e.key=='Escape')exitBox.style.display='block'});

loadChannels();
</script>
</body>
</html>
