<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faisal TV</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma}
body{background:#000;color:#fff;transition:filter 0.3s}
:root{--gold:#FFD700}
.header{background:#111;padding:12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold)}
.logo{color:var(--gold);font-size:22px;font-weight:bold;display:flex;align-items:center;gap:8px}
.icons{display:flex;gap:18px}
.icons button{background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
.icons button:hover{color:var(--gold)}
.tabs{display:flex;background:#111}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;color:#999;font-weight:bold}
.tab.active{color:var(--gold);border-bottom:3px solid var(--gold)}
.sub{display:flex;gap:10px;padding:12px;overflow-x:auto;background:#0a0a0a}
.sub button{padding:10px 16px;background:#222;border:1px solid #444;border-radius:25px;color:#fff;cursor:pointer;white-space:nowrap;font-size:14px}
.sub button.active{background:var(--gold);color:#000;border-color:var(--gold)}
.grid{padding:15px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding-bottom:80px}
.card{background:#1a1a1a;border:2px solid #333;border-radius:15px;padding:20px;text-align:center;cursor:pointer;position:relative}
.card:hover{border-color:var(--gold);transform:scale(1.03)}
.card i{font-size:45px;color:var(--gold);margin-bottom:10px}
.card-title{font-size:13px;font-weight:bold}
.fav{position:absolute;top:8px;left:8px;color:#555;font-size:18px;cursor:pointer}
.fav.active{color:red}
.bottom{position:fixed;bottom:0;width:100%;background:#111;display:flex;border-top:2px solid var(--gold);z-index:10}
.nav{flex:1;padding:10px;text-align:center;color:#999;font-size:11px;cursor:pointer}
.nav.active{color:var(--gold)}
.nav i{display:block;font-size:20px;margin-bottom:4px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:99}
.modal-box{background:#111;padding:30px;border-radius:20px;border:2px solid var(--gold);width:90%;max-width:400px}
.bright{filter:brightness(1.7)}
.loading{text-align:center;padding:40px;color:var(--gold)}
</style>
</head>
<body>

<div class="header">
  <div class="icons">
    <button id="search"><i class="fas fa-search"></i></button>
    <button id="refresh"><i class="fas fa-sync-alt"></i></button>
    <button id="light"><i class="fas fa-sun"></i></button>
  </div>
  <div class="logo">Faisal TV <i class="fas fa-crown"></i></div>
  <div class="icons">
    <button onclick="window.open('https://t.me/FAISALDz44','_blank')"><i class="fab fa-telegram"></i></button>
    <button id="menu"><i class="fas fa-bars"></i></button>
  </div>
</div>

<div class="tabs">
  <div class="tab">المباريات</div>
  <div class="tab">المسلسلات</div>
  <div class="tab">الأفلام</div>
  <div class="tab active">القنوات</div>
</div>

<div class="sub">
  <button>كرتون 👶</button>
  <button>الأخبار 📰</button>
  <button class="active">الرياضة ⚽</button>
  <button>الكل (2991) 📁</button>
</div>

<div id="grid" class="grid">
  <div class="loading">جاري تحميل القنوات...</div>
</div>

<div class="bottom">
  <div class="nav"><i class="fas fa-home"></i>الرئيسية</div>
  <div class="nav"><i class="fas fa-film"></i>الأفلام</div>
  <div class="nav"><i class="fas fa-tv"></i>المسلسلات</div>
  <div class="nav"><i class="fas fa-trophy"></i>المباريات</div>
  <div class="nav active"><i class="fas fa-broadcast-tower"></i>مباشر</div>
  <div class="nav"><i class="fas fa-heart"></i>المفضلة</div>
</div>

<div id="settings" class="modal">
  <div class="modal-box">
    <h3 style="color:var(--gold);margin-bottom:20px;text-align:center">إعدادات التطبيق</h3>
    <p><b>السيرفر:</b> http://longsat.xyz:80</p>
    <p><b>المستخدم:</b> delfraissy</p>
    <p><b>النسخة:</b> 1.0</p>
    <button onclick="document.getElementById('settings').style.display='none'" style="margin-top:20px;padding:12px;background:var(--gold);color:#000;border:none;border-radius:10px;width:100%;font-weight:bold;cursor:pointer">إغلاق</button>
  </div>
</div>

<script>
// ====== الازرار فوق ======
document.getElementById('search').onclick = () => alert('🔍 البحث قريباً');
document.getElementById('refresh').onclick = () => location.reload();
document.getElementById('light').onclick = () => document.body.classList.toggle('bright');
document.getElementById('menu').onclick = () => document.getElementById('settings').style.display='flex';

// ====== قنوات مثال كيف الصورة ======
setTimeout(()=>{
  const channels = [
  'AR| beIN MAX 1| FHD','AR| beIN MAX 1| 4K','BEIN MAX WC 2026','BEIN 4K WC 2026',
  'AR| BEIN MAX 1|','AR| beIN MAX| 1HD','AR| beIN MAX 1| HD','BEIN MAX 1HD',
  'AR| beIN MAX 2| FHD','BEIN MAX 2FHD','AR| BEIN MAX 2| 4K','AR| BEIN MAX 1| SD'
  ];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  channels.forEach(ch=>{
    grid.innerHTML += `<div class="card"><i class="fas fa-star fav" onclick="this.classList.toggle('active');event.stopPropagation()"></i><i class="fas fa-tv"></i><div class="card-title">${ch}</div></div>`;
  });
},1000);
</script>
</body>
</html>
